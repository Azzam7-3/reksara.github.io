<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Saya</title>
  <style>
    /* CSS untuk desain modern */
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6; /* Warna latar abu-abu terang */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background-color: white;
      padding: 40px 30px;
      border-radius: 20px; /* Sudut melengkung */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* Efek bayangan modern */
      text-align: center;
      max-width: 350px;
      width: 85%;
    }
    .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Gradasi warna */
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      font-weight: bold;
    }
    h1 { margin: 0; color: #1f2937; font-size: 24px; font-weight: 700; }
    p { color: #6b7280; font-size: 15px; margin-top: 12px; line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      background-color: #111827; /* Tombol warna gelap modern */
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: background 0.3s ease;
    }
    .btn:hover { background-color: #374151; }
  </style>
</head>
<body>

  <!-- Bagian Konten Website -->
  <div class="card">
    <!-- Ganti huruf "A" dengan inisial Anda -->
    <div class="avatar">A</div> 
    
    <!-- Ganti teks di bawah sesuai keinginan Anda -->
    <h1>Halo, Saya [Nama Anda]</h1>
    <p>Selamat datang di website portofolio saya. Saya membuatnya langsung menggunakan HP Android dengan desain yang modern dan responsif!</p>
    
    <!-- Anda bisa mengganti tanda # dengan link Instagram/WhatsApp Anda -->
    <a href="#" class="btn">Hubungi Saya</a>
  </div>

</body>
</html>
